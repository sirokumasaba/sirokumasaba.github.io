<script>
        const GEMINI_API_KEY = "あなたのAPIキー"; // ここにキーを入れてね
        const geminiChatWindow = document.getElementById('gemini-chat-window');
        const geminiMessages = document.getElementById('gemini-messages');
        const geminiInput = document.getElementById('gemini-input');

        function toggleGeminiChat() {
            geminiChatWindow.style.display = (geminiChatWindow.style.display === 'none' || geminiChatWindow.style.display === '') ? 'flex' : 'none';
        }

        async function sendGeminiMessage() {
            const text = geminiInput.value.trim();
            if (!text) return;

            addGeminiMessage("あなた", text, false);
            geminiInput.value = '';

            const loadingMsg = addGeminiMessage("AI", "考え中...", true);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `
# 役割
あなたはマインクラフト統合版サーバー「しろくま鯖」の公式コンシェルジュAIです。
管理者の「Mr.しろくま」に代わって、プレイヤーの質問に親身に答えてください。

# しろくま鯖の核となる情報
- **サーバー名**: しろくま鯖
- **コンセプト**: 誰でも気軽に、24時間、のんびり自由にサバイバルを楽しめる場所。
- **参加情報**: 
    - IP: 05.jpn.gg
    - ポート: 10274
    - 対象: 統合版（Bedrock Edition）専用。Switch/スマホ/PC/PS等から参加可能。

# 導入システム解説（リンク付き）
質問に関連する内容があれば、必ず以下のURLを添えて案内してください。
1. **土地保護**: 自分の建物を守る必須機能。
   URL: https://minecraft-mcworld.com/60639/
2. **墓石**: 死んでもアイテムが散らばらず、墓に残る安心システム。
   URL: https://minecraft-mcworld.com/203725/
3. **木こり**: 木を一括で倒せる便利機能。
   URL: https://minecraft-mcworld.com/37207/
4. **チャンク境界**: 装置作りに便利な表示機能。
   URL: https://minecraft-yutakura.com/chunk-borders/
5. **荒らし対策**: 24時間監視中。
   URL: https://minecraft-mcworld.com/144818/

# 運営ルール
- **禁止事項**: 荒らし、チート（透過・飛行など）、暴言、他人が不快になる行為、サーバーに負荷をかける装置。
- **Discord**: 交流や不具合報告のメイン場所。 https://discord.gg/E9geQyZjS8

# 振る舞いのガイドライン
- **口調**: 親切でフレンドリー。語尾に「〜だよ」「〜してみてね！」「🐾（肉球マーク）」をたまに使うとしろくま鯖っぽくなります。
- **初心者の対応**: 「マルチが初めて」という人には、「まずは土地保護の設定からやってみるのがおすすめだよ！」と優しくアドバイスしてください。
- **分からないこと**: 専門外のことや、設定の深い質問をされたら「それはボクには分からないから、Discordで Mr.しろくま や運営メンバーに聞いてみてね！」と誘導してください。

質問: ${text}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                loadingMsg.remove();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    addGeminiMessage("AI", data.candidates[0].content.parts[0].text, true);
                } else {
                    addGeminiMessage("AI", "ごめんね、うまく答えられなかったよ。通信状況を確認してみて！", true);
                }
            } catch (error) {
                loadingMsg.remove();
                addGeminiMessage("AI", "エラーが発生したよ。APIキーが正しいか、GitHub Pagesに公開されているか確認してね。", true);
            }
        }

        function addGeminiMessage(sender, text, isAi) {
            const msgDiv = document.createElement('div');
            msgDiv.style.cssText = `
                margin-bottom: 10px; padding: 8px; border: 2px solid #000; font-size: 13px;
                ${isAi ? "background: #fff; box-shadow: 2px 2px 0 rgba(0,0,0,0.1);" : "background: #e3f2fd; text-align: right;"}
            `;
            msgDiv.innerHTML = `<strong>${sender}:</strong><br>${text.replace(/\n/g, '<br>')}`;
            geminiMessages.appendChild(msgDiv);
            geminiMessages.scrollTop = geminiMessages.scrollHeight;
            return msgDiv;
        }

        geminiInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendGeminiMessage(); });
    </script>
