<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しろくま鯖 | Minecraft Server Official</title>
    <style>
        :root { --main-blue: #00b4d8; --soft-white: #f8f9fa; --dark-gray: #444; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--soft-white); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
        h1 { color: var(--main-blue); font-size: 2rem; margin-bottom: 10px; }
        .server-status { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        
        /* サーバー情報カードのデザイン */
        .ip-card { background: #edf2f4; padding: 20px; border-radius: 12px; border: 2px dashed var(--main-blue); position: relative; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .ip-card:hover { background: #e2eafc; transform: scale(1.02); }
        .ip-label { font-size: 0.8rem; color: var(--main-blue); font-weight: bold; margin-bottom: 5px; }
        .ip-value { font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; font-weight: bold; color: var(--dark-gray); }
        .port-value { color: #d62828; } /* ポート番号を目立たせる色 */
        .copy-hint { font-size: 0.7rem; color: var(--main-blue); margin-top: 8px; }

        .description { line-height: 1.6; color: #555; margin: 20px 0; }
        .btn { display: inline-block; padding: 12px 25px; background-color: var(--main-blue); color: white; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,180,216,0.3); }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐾 しろくま鯖 🐾</h1>
        <p class="server-status">アットホームなサバイバルサーバー</p>
        
        <div class="ip-card" onclick="copyIP()">
            <div class="ip-label">サーバーアドレス / ポート</div>
            <div class="ip-value">
                <span id="ip-address">mrsirokuma.playerserver.jp</span><br>
                ポート: <span id="port-number" class="port-value">10274</span>
            </div>
            <div class="copy-hint">タップしてアドレスをコピー</div>
        </div>

        <div class="description">
            <p>初心者大歓迎！みんなで仲良くマイクラを楽しもう。<br>
            ※ポート番号 <strong>10274</strong> の入力を忘れずに！</p>
        </div>
        
        <a href="#" class="btn">Discordに参加する</a>
    </div>

    <script>
        function copyIP() {
            const ip = document.getElementById('ip-address').innerText;
            // アドレスだけコピーするか、ポートも含めるか選べますが、一般的にはアドレスのみが便利です
            navigator.clipboard.writeText(ip);
            
            // コピー完了通知
            alert("サーバーアドレスをコピーしました！\n" + ip + "\n\n※ポート番号 10274 も忘れずに入力してくださいね！");
        }
    </script>
</body>
</html>
