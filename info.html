<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>仕様・管理者 - しろくま鯖</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body>
    <nav id="sidebar">
        </nav>

    <main>
        <div class="mc-container">
            <h2>🛠 サーバーの仕様</h2>
            <table style="width:100%; text-align:left; border-spacing: 0 10px;">
                <tr><th>バージョン</th><td>Minecraft 統合版 最新版</td></tr>
                <tr><th>導入アドオン</th><td>
                    ・木こり一括破壊<br>
                    ・しろくま特製家具<br>
                    ・プレイヤーショップ機能
                </td></tr>
                <tr><th>独自コマンド</th><td>
                    <code>/spawn</code> - 初期リスへ戻る<br>
                    <code>/home</code> - 自分の拠点へワープ
                </td></tr>
            </table>

            <h2 style="margin-top:40px;">❄️ 運営メンバー</h2>
            <div class="admin-card" style="display:flex; align-items:center; gap:20px;">
                <img src="https://minotar.net/avatar/steve/64" style="border:3px solid #000;">
                <div>
                    <span class="admin-badge">OWNER</span> <strong>しろくま長</strong><br>
                    <small>このサーバーの主。氷山の上で寝るのが好き。</small>
                </div>
            </div>
        </div>
    </main>

</html>
